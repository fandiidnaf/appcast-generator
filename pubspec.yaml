name: appcast_generator
description: Appcast XML Generator - Generate Sparkle/Appcast feeds for app update notifications
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  clipboard: ^3.0.14
  crypto: ^3.0.7
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0
  intl: ^0.20.2
  path: ^1.9.1
  provider: ^6.1.5+1
  universal_html: ^2.3.0
  uuid: ^4.5.3
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
