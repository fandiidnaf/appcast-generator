<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Generate Appcast XML feeds for Sparkle and flutter_upgrader.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Appcast Generator">
  <meta property="og:description" content="Generate Sparkle-compatible appcast.xml for app update notifications">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <title>Appcast Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F8FAFC; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }

    #splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #F8FAFC;
      z-index: 9999;
      transition: opacity 0.25s ease;
    }
    #splash.out { opacity: 0; pointer-events: none; }

    .s-icon {
      width: 52px; height: 52px; border-radius: 13px;
      background: #2563EB;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .s-icon svg { width: 28px; height: 28px; }

    .s-name {
      font-size: 15px; font-weight: 600; color: #0F172A;
      letter-spacing: -0.2px; margin-bottom: 3px;
    }
    .s-sub { font-size: 11.5px; color: #94A3B8; margin-bottom: 22px; }

    .s-bar {
      width: 100px; height: 2px; background: #E2E8F0;
      border-radius: 2px; overflow: hidden;
    }
    .s-fill {
      height: 100%; background: linear-gradient(90deg, #2563EB, #10B981);
      border-radius: 2px;
      animation: prog 1.6s ease-in-out infinite;
    }
    @keyframes prog {
      0%   { width: 0%;  margin-left: 0; }
      50%  { width: 55%; margin-left: 22%; }
      100% { width: 0%;  margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="s-icon">
      <!-- RSS icon -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6" cy="18" r="2.5" fill="white"/>
        <path d="M4 11.5A8.5 8.5 0 0 1 12.5 20" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <path d="M4 6A13 13 0 0 1 18 20" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <circle cx="18.5" cy="6.5" r="2" fill="#10B981"/>
      </svg>
    </div>
    <div class="s-name">Appcast Generator</div>
    <div class="s-sub">Sparkle · flutter_upgrader</div>
    <div class="s-bar"><div class="s-fill"></div></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('splash');
      el.classList.add('out');
      setTimeout(() => el.remove(), 280);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
