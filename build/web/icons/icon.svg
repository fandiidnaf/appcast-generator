<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="white_fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="green_fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner shadow top -->
  <rect width="512" height="2" rx="0" fill="#FFFFFF" fill-opacity="0.12"/>

  <!-- RSS signal arcs — white, anchor at bottom-left of icon center -->
  <!-- Anchor dot -->
  <circle cx="152" cy="360" r="32" fill="url(#white_fade)"/>

  <!-- Arc 1 — smallest -->
  <path d="M 152,360 A 80,80 0 0 1 232,280"
        fill="none" stroke="white" stroke-width="34"
        stroke-linecap="round" opacity="1"/>

  <!-- Arc 2 — medium -->
  <path d="M 152,360 A 156,156 0 0 1 308,204"
        fill="none" stroke="white" stroke-width="32"
        stroke-linecap="round" opacity="0.65"/>

  <!-- Arc 3 — large -->
  <path d="M 152,360 A 228,228 0 0 1 380,132"
        fill="none" stroke="white" stroke-width="30"
        stroke-linecap="round" opacity="0.3"/>

  <!-- Emerald accent dot top-right — version/update indicator metaphor -->
  <circle cx="376" cy="140" r="36" fill="url(#green_fade)"/>
  <circle cx="376" cy="140" r="16" fill="white" fill-opacity="0.9"/>
</svg>